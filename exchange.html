<!DOCTYPE html>
<html>
<head>
<title>Exchange</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container">
    <a class="navbar-brand" href="index.html"> GardenNet</a>
  </div>
</nav>

<div class="container mt-4">

  <!-- Heading -->
  <h2 class="text-center mb-4">Seed Exchange </h2>

  <!-- Search + Filter -->
  <div class="row mb-4">
    <div class="col-md-8">
      <input type="text" class="form-control" placeholder="Search seeds...">
    </div>
    <div class="col-md-4">
      <select class="form-select">
        <option selected>Category</option>
        <option>Vegetables</option>
        <option>Flowers</option>
        <option>Herbs</option>
      </select>
    </div>
  </div>

  <!-- Cards -->
  <div class="row g-4">

    <!-- Card 1 -->
    <div class="col-sm-6 col-md-4">
      <div class="card shadow h-100">
        <img src="ex1.jpg" class="card-img-top">
        <div class="card-body text-center">
          <h5>Tomato Seeds </h5>
          <p>Organic & fresh</p>
          <p><strong>₹50</strong></p>
          <button class="btn btn-success w-100 mb-2"
        onclick="exchangeItem('Tomato Seeds')">
  Exchange
</button>

<button class="btn btn-primary w-100"
        onclick="buyItem('Tomato Seeds', 50)">
  Buy
</button>


        </div>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="col-sm-6 col-md-4">
      <div class="card shadow h-100">
        <img src="ex2.webp" class="card-img-top">
        <div class="card-body text-center">
          <h5>Rose Seeds </h5>
          <p>Beautiful flowers</p>
          <p><strong>₹80</strong></p>
          <button class="btn btn-success w-100 mb-2"
        onclick="exchangeItem('Rose Seeds')">
  Exchange
</button>

<button class="btn btn-primary w-100"
        onclick="buyItem('Rose Seeds', 50)">
  Buy
</button>
        </div>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="col-sm-6 col-md-4">
      <div class="card shadow h-100">
        <img src="ex3.jpg" class="card-img-top">
        <div class="card-body text-center">
          <h5>Basil Seeds </h5>
          <p>Perfect for cooking</p>
          <p><strong>₹40</strong></p>
          <button class="btn btn-success w-100 mb-2"
        onclick="exchangeItem('Basil Seeds')">
  Exchange
</button>

<button class="btn btn-primary w-100"
        onclick="buyItem('Basil Seeds', 50)">
  Buy
</button>
        </div>
      </div>
    </div>

    <!-- Card 4 -->
    <div class="col-sm-6 col-md-4">
      <div class="card shadow h-100">
        <img src="ex4.jpg" class="card-img-top">
        <div class="card-body text-center">
          <h5>Sunflower Seeds </h5>
          <p>Bright garden vibes</p>
          <p><strong>₹60</strong></p>
          <button class="btn btn-success w-100 mb-2"
        onclick="exchangeItem('Sun flower Seeds')">
  Exchange
</button>

<button class="btn btn-primary w-100"
        onclick="buyItem('Sun flower Seeds', 50)">
  Buy
</button>
        </div>
      </div>
    </div>

    <!-- Card 5 -->
    <div class="col-sm-6 col-md-4">
      <div class="card shadow h-100">
        <img src="ex5.webp" class="card-img-top">
        <div class="card-body text-center">
          <h5>Mint Seeds </h5>
          <p>Fresh aroma</p>
          <p><strong>₹30</strong></p>
          <button class="btn btn-success w-100 mb-2"
        onclick="exchangeItem('Mint Seeds')">
  Exchange
</button>

<button class="btn btn-primary w-100"
        onclick="buyItem('Mint Seeds', 50)">
  Buy
</button>
        </div>
      </div>
    </div>

    <!-- Card 6 -->
    <div class="col-sm-6 col-md-4">
      <div class="card shadow h-100">
        <img src="ex6.jpg" class="card-img-top">
        <div class="card-body text-center">
          <h5>Chili Seeds </h5>
          <p>Spicy & easy to grow</p>
          <p><strong>₹35</strong></p>
          <button class="btn btn-success w-100 mb-2"
        onclick="exchangeItem('Chilli Seeds')">
  Exchange
</button>

<button class="btn btn-primary w-100"
        onclick="buyItem('Chilli Seeds', 50)">
  Buy
</button>
        </div>
      </div>
    </div>

  </div>

</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
  <p>© 2026 GardenNet </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function exchangeItem(itemName) {
  alert("🤝 Exchange request sent for " + itemName);
}

function buyItem(itemName, price) {
  alert("🛒 " + itemName + " added to cart for ₹" + price);
}
</script>

</body>
</html>
