<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container">
    <a class="navbar-brand" href="index.html"> GardenNet</a>
  </div>
</nav>

<!-- 🌿 PROFILE CONTAINER -->
<div class="container mt-4 text-center">

  <!--  PROFILE FORM -->
  <div id="profileForm">

    <h4>Complete Your Profile </h4>

    <input type="text" id="nameInput" class="form-control mt-2" placeholder="Enter Name">

    <input type="text" id="bioInput" class="form-control mt-2" placeholder="Enter Bio">

    <button onclick="saveProfile()" class="btn btn-success mt-3 w-100">
      Save Profile
    </button>

  </div>

  <!-- 👤 PROFILE DISPLAY -->
  <div id="profileDisplay" style="display: none;">

    <img src="hero.jpg" class="rounded-circle mb-3"
         style="width:120px; height:120px; object-fit:cover;">

    <h3 id="displayName"></h3>
    <p id="displayBio"></p>

    <!-- Stats -->
    <div class="row mt-4">
      <div class="col">
        <h5>12</h5>
        <p>Posts</p>
      </div>
      <div class="col">
        <h5>250</h5>
        <p>Followers</p>
      </div>
      <div class="col">
        <h5>180</h5>
        <p>Following</p>
      </div>
    </div>

    <button onclick="editProfile()" class="btn btn-outline-success mt-3">
      Edit Profile
    </button>

  </div>

</div>

<!-- My Garden -->
<div class="container mt-5">

  <h4>My Garden </h4>

  <div class="row g-3 mt-2">

    <div class="col-sm-6 col-md-3">
      <img src="p1.jpg" class="img-fluid rounded">
    </div>

    <div class="col-sm-6 col-md-3">
      <img src="p2.jpg" class="img-fluid rounded">
    </div>

    <div class="col-sm-6 col-md-3">
      <img src="p3.jpg" class="img-fluid rounded">
    </div>

    <div class="col-sm-6 col-md-3">
      <img src="p4.jpg" class="img-fluid rounded">
    </div>

  </div>

</div>

<!-- Activity Section -->
<div class="container mt-5">

  <h4>Recent Activity </h4>

  <div class="card mt-3">
    <div class="card-body">
      <p> Posted a new plant photo</p>
    </div>
  </div>

  <div class="card mt-2">
    <div class="card-body">
      <p> Joined Gardening Workshop</p>
    </div>
  </div>

</div>

<!-- Add Post -->
<div class="container mt-5">

  <h4>Add New Post </h4>

  <form onsubmit="return false;">
    <div class="mb-3">
      <input type="text" class="form-control" placeholder="Post Title">
    </div>

    <div class="mb-3">
      <input type="file" class="form-control">
    </div>

    <button class="btn btn-success w-100">Upload</button>
  </form>

</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
  <p>© 2026 GardenNet </p>
</footer>

<!-- JS -->
<script>

function saveProfile() {
  let name = document.getElementById("nameInput").value;
  let bio = document.getElementById("bioInput").value;

  localStorage.setItem("name", name);
  localStorage.setItem("bio", bio);

  loadProfile();
}

function loadProfile() {
  let name = localStorage.getItem("name");
  let bio = localStorage.getItem("bio");

  if (name && bio) {
    document.getElementById("profileForm").style.display = "none";
    document.getElementById("profileDisplay").style.display = "block";

    document.getElementById("displayName").innerText = name;
    document.getElementById("displayBio").innerText = bio;
  }
}

function editProfile() {
  document.getElementById("profileForm").style.display = "block";
  document.getElementById("profileDisplay").style.display = "none";
}

// Page load
window.onload = function () {
  loadProfile();
};

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
